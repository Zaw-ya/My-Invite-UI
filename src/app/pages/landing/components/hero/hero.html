<section class="min-h-screen bg-white relative overflow-hidden flex items-center">
  <!-- Gold Gradient Blob Background -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-bl from-[#F5ECD7]/60 via-white to-white"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-[#B8860B]/8 rounded-full blur-3xl"></div>
    <div class="absolute top-20 left-20 w-64 h-64 bg-[#D4AF37]/6 rounded-full blur-3xl"></div>
  </div>

  <div class="container mx-auto px-6 py-24 relative z-10">
    <div class="grid lg:grid-cols-2 gap-16 items-center">
      <!-- Phone mockup left -->
      <div class="flex justify-center order-2 lg:order-1">
        <div class="relative w-72 md:w-96">
          <!-- Gold glow ring -->
          <div class="absolute inset-0 bg-[#B8860B]/10 rounded-full blur-3xl scale-110"></div>
          <img src="image/image.png" alt="تجربة الدعوات" class="relative z-10 w-full drop-shadow-2xl">
        </div>
      </div>

      <!-- Text right -->
      <div class="text-right space-y-8 order-1 lg:order-2">
        <!-- Badge -->
        <div class="inline-flex items-center gap-2 px-5 py-2 bg-[#F5ECD7] border border-[#E8D9B0] rounded-full">
          <span class="text-[#B8860B] font-bold text-sm">✦ دعوات رقمية فاخرة</span>
        </div>

        <h1 class="text-5xl lg:text-6xl font-black text-[#1A1A1A] leading-tight">
          تجربة دعوات<br>
          <span class="text-[#B8860B]">مبتكرة</span>
        </h1>
        <p class="text-xl text-[#1A1A1A] font-bold">مع ماي انفايت !</p>
        <p class="text-lg text-[#666] leading-relaxed">
          حلول رقمية متكاملة لمناسباتك.. تصاميم فاخرة، توصيل فوري، وإدارة كاملة لضيوفك.
        </p>

        <!-- Stars & Clients -->
        <div class="flex items-center gap-4 justify-end">
          <div class="text-right">
            <p class="text-sm text-[#888]">يثق بنا أكثر من</p>
            <p class="font-black text-[#1A1A1A] text-lg">5,000+ عميل سعيد</p>
          </div>
          <div class="flex text-[#B8860B] gap-1">
            <lucide-icon *ngFor="let i of [1,2,3,4,5]" name="star" class="w-5 h-5 fill-current"></lucide-icon>
          </div>
        </div>

        <!-- CTAs -->
        <div class="flex gap-4 justify-end flex-wrap">
          <button class="btn-outline-gold">
            <lucide-icon name="play" class="w-5 h-5"></lucide-icon>
            شاهد الفيديو
          </button>
          <button class="btn-gold">
            اكتشف المزيد
            <lucide-icon name="arrow-left" class="w-5 h-5"></lucide-icon>
          </button>
        </div>
      </div>
    </div>

   
  </div>
</section>
