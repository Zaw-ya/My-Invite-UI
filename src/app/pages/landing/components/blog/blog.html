<section id="blog" class="section-py" style="background-color: var(--bg);">
  <div class="container mx-auto px-5">

    <!-- Header row -->
    <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-14">
      <button class="flex items-center gap-2 font-black group" style="color: var(--gold);">
        <lucide-icon name="arrow-left" class="w-5 h-5 transition-transform group-hover:-translate-x-1"></lucide-icon>
        عرض جميع المقالات
      </button>
      <div class="text-right space-y-2">
        <span class="badge-pill">✦ المدونة</span>
        <h2 class="section-title text-right">المدونة <span>والنصائح</span></h2>
        <div class="gold-divider" style="margin-right: 0; margin-left: auto; width: 48px;"></div>
      </div>
    </div>

    <!-- Blog Posts Grid -->
    <div class="grid md:grid-cols-2 gap-10">
      @for (post of blogPosts; track post.id) {
        <article class="blog-card group cursor-pointer">

          <!-- Image -->
          <div class="blog-img-wrap">
            <img [src]="post.imageUrl" [alt]="post.title"
                 class="blog-img group-hover:scale-105 transition-transform duration-700">
            <div class="blog-img-gradient"></div>

            <!-- Category badge -->
            <div class="blog-cat-badge">{{ post.category }}</div>
          </div>

          <!-- Content -->
          <div class="blog-content space-y-3 text-right">
            <p class="text-sm font-bold" style="color: var(--gold);">{{ post.date | date:'yyyy/MM/dd' }}</p>
            <h4 class="blog-title group-hover:text-gold transition-colors">{{ post.title }}</h4>
            <p class="text-sm leading-relaxed line-clamp-2" style="color: var(--text-muted);">{{ post.excerpt }}</p>
            <button class="blog-read-more">
              اقرأ المزيد
              <lucide-icon name="arrow-left" class="w-4 h-4"></lucide-icon>
            </button>
          </div>
        </article>
      }
    </div>

  </div>
</section>
