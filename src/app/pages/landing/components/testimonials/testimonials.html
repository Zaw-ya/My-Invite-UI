<section class="py-24 bg-[#F5ECD7]/30">
  <div class="container mx-auto px-6">
    <div class="text-center mb-16 space-y-3">
      <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-[#F5ECD7] rounded-full border border-[#E8D9B0]">
        <span class="text-[#B8860B] font-bold text-sm">✦ آراء عملائنا</span>
      </div>
      <h2 class="text-4xl font-black text-[#1A1A1A]">ماذا يقول <span class="text-[#B8860B]">عملاؤنا</span></h2>
      <div class="w-16 h-1 bg-[#B8860B] rounded-full mx-auto"></div>
      <p class="text-[#666]">آلاف المناسبات الناجحة وعملاء سعداء في المملكة</p>
    </div>
    <div class="grid md:grid-cols-2 gap-10">
      <div
        *ngFor="let t of testimonials"
        class="bg-white p-10 rounded-2xl border border-[#E8D9B0] shadow-[0_4px_20px_rgba(184,134,11,0.08)] hover:shadow-[0_12px_40px_rgba(184,134,11,0.15)] transition-all hover:-translate-y-1 text-right relative"
      >
        <!-- Quote icon -->
        <div class="absolute top-6 left-6 text-5xl font-black text-[#B8860B]/10 leading-none">"</div>
        <!-- Stars -->
        <div class="flex text-[#B8860B] gap-1 mb-6 justify-end">
          <lucide-icon *ngFor="let i of [1,2,3,4,5]" name="star" class="w-5 h-5 fill-current"></lucide-icon>
        </div>
        <p class="text-lg text-[#333] leading-relaxed italic mb-8">"{{t.content}}"</p>
        <div class="flex items-center justify-end gap-4 pt-6 border-t border-[#E8D9B0]">
          <div>
            <h4 class="font-black text-[#1A1A1A]">{{t.name}}</h4>
            <p class="text-[#888] text-sm">{{t.role}} &bull; {{t.eventType}}</p>
          </div>
          <div class="w-14 h-14 bg-[#B8860B] rounded-xl flex items-center justify-center text-white text-2xl font-black shadow-gold">
            {{t.name.charAt(0)}}
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
