<section id="events" class="section-py" style="background-color: var(--bg);">
  <div class="container mx-auto px-5">

    <!-- Header -->
    <div class="text-center space-y-4 mb-12">
      <span class="badge-pill">✦ أقسامنا</span>
      <h2 class="section-title">تصفح <span>أقسامنا</span></h2>
      <p class="section-sub">استمتع بجمال الأقسام المختارة خصيصاً لتناسب جميع مناسباتك</p>
    </div>

    <!-- Events Grid -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">

      <!-- Row 1: 4 Image Cards -->
      <div class="event-card group">
        <img src="image/image3.png" alt="حفلات زواج" class="event-img">
        <div class="event-overlay group-hover:opacity-100">
          <h3 class="event-label">حفلات زواج</h3>
        </div>
      </div>
      <div class="event-card group">
        <img src="image/image3.png" alt="حفلات تخرج" class="event-img">
        <div class="event-overlay group-hover:opacity-100">
          <h3 class="event-label">حفلات تخرج</h3>
        </div>
      </div>
      <div class="event-card group">
        <img src="image/image3.png" alt="حفلات الشركات" class="event-img">
        <div class="event-overlay group-hover:opacity-100">
          <h3 class="event-label">حفلات الشركات</h3>
        </div>
      </div>
      <div class="event-card group">
        <img src="image/image3.png" alt="المناسبات الحكومية" class="event-img">
        <div class="event-overlay group-hover:opacity-100">
          <h3 class="event-label">المناسبات الحكومية</h3>
        </div>
      </div>

      <!-- Row 2: Mixed layout -->
      <div class="event-text-card text-center">
        <p class="event-text-content">لأن أول خطوة للفرح دعوة تترك أثر</p>
        <lucide-icon name="sparkles" class="w-8 h-8 mt-3" style="color: var(--gold);"></lucide-icon>
      </div>
      <div class="event-text-card text-center" style="background-color: var(--gold); border-color: var(--gold);">
        <p class="event-text-content-inv">أضف لمسة من الأناقة إلى مناسبتك !</p>
      </div>
      <div class="event-card group">
        <img src="image/image3.png" alt="حفلات أخرى" class="event-img">
        <div class="event-overlay group-hover:opacity-100">
          <h3 class="event-label">حفلات أخرى</h3>
        </div>
      </div>
      <div class="event-card group">
        <img src="image/image3.png" alt="فعاليات عامة" class="event-img">
        <div class="event-overlay group-hover:opacity-100">
          <h3 class="event-label">فعاليات عامة</h3>
        </div>
      </div>

    </div>
  </div>
</section>
