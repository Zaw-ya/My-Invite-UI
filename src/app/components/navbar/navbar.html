  <!-- ===== MAIN NAVBAR ===== -->
  <nav class="py-3">
    <div class="container mx-auto px-5 flex items-center justify-between gap-4">

      <!-- RIGHT: Logo (brand = مؤسسة بطاقتي الخاصة) -->
      <a routerLink="/" class="flex items-center gap-2 flex-shrink-0">
        <img src="/assets/images/NavFootdark.png" alt="Logo" class="logo-dark h-10 md:h-12 w-auto object-contain">
        <img src="/assets/images/navfoot.png" alt="Logo" class="logo-light h-10 md:h-12 w-auto object-contain">
      </a>

      <!-- CENTER: Nav Links (desktop always visible) -->
      <div class="hidden md:flex items-center gap-5 flex-1 justify-center">
        <a href="#" class="nav-link" (click)="smoothScroll($event, '#')">الرئيسية</a>
        <a href="#designs" class="nav-link" (click)="smoothScroll($event, '#designs')">التصاميم</a>
        <a href="#demo" class="nav-link" (click)="smoothScroll($event, '#demo')">تجربة الخدمة</a>
        <a href="#packages" class="nav-link" (click)="smoothScroll($event, '#packages')">الباقات</a>
        <a href="#additional-services" class="nav-link" (click)="smoothScroll($event, '#additional-services')">مميزات
          الخدمة</a>
        <!-- <a href="#about" class="nav-link" (click)="smoothScroll($event, '#about')">عن مؤسسة بطاقتي الخاصة</a> -->
        <a href="#contact" class="nav-link" (click)="smoothScroll($event, '#contact')">تواصل معنا</a>
        <a href="#blog" class="nav-link" (click)="smoothScroll($event, '#blog')">المدونة</a>
      </div>

      <!-- LEFT: Actions -->
      <div class="flex items-center gap-2 flex-shrink-0">
        <!-- Hamburger: always on mobile, on desktop only when scrolled -->
        <button class="icon-btn hamburger-btn" [class.is-scrolled]="isScrolled" (click)="toggleMenu()" title="القائمة">
          <lucide-icon [name]="isMenuOpen ? 'x' : 'menu'" class="w-5 h-5"></lucide-icon>
        </button>
      </div>
    </div>

    <!-- ===== MOBILE MENU ===== -->
    <div class="md:hidden mobile-menu" [class.open]="isMenuOpen">
      <div class="container mx-auto px-5 py-3 flex flex-col gap-2 text-right">
        <a href="#" class="mobile-link" (click)="smoothScroll($event, '#')">الرئيسية</a>
        <a href="#designs" class="mobile-link" (click)="smoothScroll($event, '#designs')">التصاميم</a>
        <a href="#demo" class="mobile-link" (click)="smoothScroll($event, '#demo')">تجربة الخدمة</a>
        <a href="#packages" class="mobile-link" (click)="smoothScroll($event, '#packages')">الباقات</a>
        <a href="#additional-services" class="mobile-link" (click)="smoothScroll($event, '#additional-services')">مميزات
          الخدمة</a>
        <a href="#blog" class="mobile-link" (click)="smoothScroll($event, '#blog')">المدونة</a>
        <a href="#contact" class="mobile-link" (click)="smoothScroll($event, '#contact')">تواصل معنا</a>
        <div class="pt-2 border-t" style="border-color: var(--border);">
          <p class="text-xs mb-0.5" style="color: var(--text-muted);">البريد الإلكتروني</p>
          <p class="font-bold text-xs" style="color: var(--gold);">{{ settings()['contact-email'] }}</p>
        </div>
      </div>
    </div>
  </nav>
</header>
