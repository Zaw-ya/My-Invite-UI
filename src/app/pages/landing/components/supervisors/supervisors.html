<section class="py-24 bg-[#F5ECD7]/30">
  <div class="container mx-auto px-6">
    <!-- Section Header -->
    <div class="text-center mb-16 space-y-3">
      <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-[#F5ECD7] rounded-full border border-[#E8D9B0]">
        <span class="text-[#B8860B] font-bold text-sm">✦ فريق الإشراف</span>
      </div>
      <h2 class="text-4xl font-black text-[#1A1A1A]">
        مشرفون <span class="text-[#B8860B]">محترفون</span>
      </h2>
      <div class="w-16 h-1 bg-[#B8860B] rounded-full mx-auto"></div>
      <p class="text-[#666] text-lg max-w-xl mx-auto leading-relaxed">
        استرخِ واستمتع بمناسبتك بينما يتولى فريقنا المحترف إدارة كل شيء بدقة واحتراف
      </p>
    </div>

    <!-- Supervisors Grid -->
    <div class="grid md:grid-cols-3 gap-10">
      <div
        *ngFor="let s of supervisors"
        class="bg-white rounded-2xl border-2 border-[#E8D9B0] overflow-hidden group hover:border-[#B8860B] hover:shadow-[0_16px_48px_rgba(184,134,11,0.15)] transition-all duration-300 hover:-translate-y-2 text-center"
      >
        <!-- Photo Area -->
        <div class="relative bg-[#F5ECD7]/40 p-8 pb-0 flex justify-center">
          <!-- Gold ring decoration -->
          <div class="absolute top-4 right-4 w-8 h-8 border-2 border-[#B8860B]/20 rounded-full"></div>
          <div class="absolute bottom-0 left-4 w-4 h-4 bg-[#B8860B]/10 rounded-full"></div>

          <!-- Avatar -->
          <div class="relative w-32 h-32 mb-0">
            <!-- Gold border ring -->
            <div class="absolute inset-0 rounded-2xl border-4 border-[#B8860B]/20 group-hover:border-[#B8860B] transition-all duration-300 z-10 rounded-2xl"></div>
            <div class="w-full h-full rounded-2xl bg-gradient-to-br from-[#D4AF37] to-[#B8860B] flex items-center justify-center overflow-hidden shadow-lg">
              <img
                [src]="s.imageUrl"
                [alt]="s.name"
                class="w-full h-full object-cover"
                (error)="showInitial($event)"
              >
              <span class="hidden text-white text-4xl font-black absolute">
                {{s.name.charAt(0)}}
              </span>
            </div>
            <!-- Verified Badge -->
            <div class="absolute -bottom-3 -right-3 w-9 h-9 bg-[#B8860B] rounded-full flex items-center justify-center border-2 border-white shadow-md z-20">
              <lucide-icon name="check" class="w-5 h-5 text-white"></lucide-icon>
            </div>
          </div>
        </div>

        <!-- Content -->
        <div class="p-8 pt-6 space-y-4">
          <div>
            <h3 class="text-xl font-black text-[#1A1A1A]">{{s.name}}</h3>
            <p class="text-[#B8860B] font-bold text-sm mt-1">{{s.role}}</p>
          </div>

          <!-- Divider -->
          <div class="w-10 h-0.5 bg-[#B8860B]/30 mx-auto group-hover:w-20 group-hover:bg-[#B8860B] transition-all duration-300"></div>

          <!-- Price Badge -->
          <div class="inline-flex items-center gap-2 px-5 py-2 bg-[#F5ECD7] border border-[#E8D9B0] rounded-full group-hover:bg-[#B8860B] group-hover:border-[#B8860B] transition-all duration-300">
            <span class="text-[#B8860B] font-black group-hover:text-white transition-colors">
              يبدأ من {{s.cost}} ر.س
            </span>
            <span class="text-[#888] text-xs group-hover:text-white/70 transition-colors">/ساعة</span>
          </div>

          <!-- Book Button -->
          <button class="w-full py-3 rounded-xl font-bold border-2 border-[#B8860B] text-[#B8860B] hover:bg-[#B8860B] hover:text-white transition-all duration-300 text-sm">
            احجز الآن
          </button>
        </div>
      </div>
    </div>

    <!-- Bottom CTA -->
    <div class="mt-16 text-center">
      <p class="text-[#666] mb-6">هل تريد الاستفسار عن فريق الإشراف؟</p>
      <button class="btn-gold mx-auto justify-center">
        تواصل مع الفريق
        <lucide-icon name="phone" class="w-5 h-5"></lucide-icon>
      </button>
    </div>
  </div>
</section>
