<section id="contact" class="section-py" style="background-color: var(--bg);">
  <div class="container mx-auto px-5">

    <!-- Header -->
    <div class="text-center mb-14 space-y-3">
      <span class="badge-pill">✦ تواصل معنا</span>
      <h2 class="section-title">نحن <span>هنا لمساعدتك</span></h2>
      <div class="gold-divider mx-auto" style="width: 56px;"></div>
    </div>

    <div class="max-w-5xl mx-auto grid lg:grid-cols-2 gap-12 items-start">

      <!-- LEFT: Contact Info -->
      <div class="space-y-8 text-right">
        <p class="text-lg leading-relaxed" style="color: var(--text-secondary);">
          هل لديك استفسار؟ فريقنا جاهز لمساعدتك في تصميم الدعوة المثالية لمناسبتك.
        </p>

        <div class="space-y-6">
          <div class="contact-item group">
            <div>
              <h4 class="font-black text-lg" style="color: var(--text);">الموقع</h4>
              <p style="color: var(--text-secondary);">الرياض، المملكة العربية السعودية</p>
            </div>
            <div class="contact-icon-box">
              <lucide-icon name="map-pin" class="w-5 h-5"></lucide-icon>
            </div>
          </div>

          <div class="contact-item group">
            <div>
              <h4 class="font-black text-lg" style="color: var(--text);">الهاتف</h4>
              <p dir="ltr" style="color: var(--text-secondary);">+966 58299 1740</p>
            </div>
            <div class="contact-icon-box">
              <lucide-icon name="phone" class="w-5 h-5"></lucide-icon>
            </div>
          </div>

          <div class="contact-item group">
            <div>
              <h4 class="font-black text-lg" style="color: var(--text);">البريد الإلكتروني</h4>
              <p style="color: var(--text-secondary);">cs&#64;myinvite.org</p>
            </div>
            <div class="contact-icon-box">
              <lucide-icon name="mail" class="w-5 h-5"></lucide-icon>
            </div>
          </div>
        </div>

        <!-- Social links -->
        <div class="flex gap-3 justify-end">
          <a href="#" class="contact-social-btn" title="Instagram">
            <lucide-icon name="instagram" class="w-4 h-4"></lucide-icon>
          </a>
          <a href="#" class="contact-social-btn" title="Twitter">
            <lucide-icon name="twitter" class="w-4 h-4"></lucide-icon>
          </a>
          <a href="#" class="contact-social-btn" title="Facebook">
            <lucide-icon name="facebook" class="w-4 h-4"></lucide-icon>
          </a>
        </div>
      </div>

      <!-- RIGHT: Contact Form -->
      <div class="contact-form-card">
        <h3 class="text-xl font-black mb-6 text-right" style="color: var(--text);">أرسل رسالة</h3>
        <form class="space-y-5 text-right">
          <div>
            <label class="contact-label">الاسم الكامل</label>
            <input type="text" class="form-input" placeholder="أدخل اسمك الكامل">
          </div>
          <div>
            <label class="contact-label">البريد الإلكتروني</label>
            <input type="email" class="form-input" placeholder="أدخل بريدك الإلكتروني">
          </div>
          <div>
            <label class="contact-label">رقم الجوال</label>
            <input type="tel" class="form-input" placeholder="05xxxxxxxx" dir="ltr">
          </div>
          <div>
            <label class="contact-label">رسالتك</label>
            <textarea rows="4" class="form-input resize-none" placeholder="كيف يمكننا مساعدتك؟"></textarea>
          </div>
          <button type="submit" class="btn-gold w-full justify-center text-base">
            إرسال الرسالة
            <lucide-icon name="send" class="w-4 h-4"></lucide-icon>
          </button>
        </form>
      </div>

    </div>
  </div>
</section>
