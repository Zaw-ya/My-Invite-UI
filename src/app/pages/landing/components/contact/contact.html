<section id="contact" class="py-24 bg-white">
  <div class="container mx-auto px-6">
    <div class="text-center mb-16 space-y-3">
      <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-[#F5ECD7] rounded-full border border-[#E8D9B0]">
        <span class="text-[#B8860B] font-bold text-sm">✦ تواصل معنا</span>
      </div>
      <h2 class="text-4xl font-black text-[#1A1A1A]">نحن <span class="text-[#B8860B]">هنا لمساعدتك</span></h2>
      <div class="w-16 h-1 bg-[#B8860B] rounded-full mx-auto"></div>
    </div>

    <div class="max-w-5xl mx-auto grid lg:grid-cols-2 gap-12">
      <!-- Contact Info -->
      <div class="space-y-8 text-right">
        <p class="text-[#555] text-lg leading-relaxed">
          هل لديك استفسار؟ فريقنا جاهز لمساعدتك في تصميم الدعوة المثالية لمناسبتك.
        </p>
        <div class="space-y-6">
          <div class="flex items-start gap-4 justify-end group">
            <div>
              <h4 class="font-black text-[#1A1A1A] text-lg">الموقع</h4>
              <p class="text-[#666]">الرياض، المملكة العربية السعودية</p>
            </div>
            <div class="w-14 h-14 bg-[#F5ECD7] border border-[#E8D9B0] rounded-xl flex items-center justify-center flex-shrink-0 group-hover:bg-[#B8860B] group-hover:border-[#B8860B] transition-all">
              <lucide-icon name="map-pin" class="w-6 h-6 text-[#B8860B] group-hover:text-white transition-colors"></lucide-icon>
            </div>
          </div>
          <div class="flex items-start gap-4 justify-end group">
            <div>
              <h4 class="font-black text-[#1A1A1A] text-lg">الهاتف</h4>
              <p class="text-[#666]" dir="ltr">+966 58299 1740</p>
            </div>
            <div class="w-14 h-14 bg-[#F5ECD7] border border-[#E8D9B0] rounded-xl flex items-center justify-center flex-shrink-0 group-hover:bg-[#B8860B] group-hover:border-[#B8860B] transition-all">
              <lucide-icon name="phone" class="w-6 h-6 text-[#B8860B] group-hover:text-white transition-colors"></lucide-icon>
            </div>
          </div>
          <div class="flex items-start gap-4 justify-end group">
            <div>
              <h4 class="font-black text-[#1A1A1A] text-lg">البريد الإلكتروني</h4>
              <p class="text-[#666]">cs&#64;myinvite.org</p>
            </div>
            <div class="w-14 h-14 bg-[#F5ECD7] border border-[#E8D9B0] rounded-xl flex items-center justify-center flex-shrink-0 group-hover:bg-[#B8860B] group-hover:border-[#B8860B] transition-all">
              <lucide-icon name="mail" class="w-6 h-6 text-[#B8860B] group-hover:text-white transition-colors"></lucide-icon>
            </div>
          </div>
        </div>
      </div>

      <!-- Form -->
      <div class="bg-white border-2 border-[#E8D9B0] rounded-2xl p-10 shadow-[0_4px_24px_rgba(184,134,11,0.08)]">
        <h3 class="text-2xl font-black text-[#1A1A1A] text-right mb-8">أرسل رسالة</h3>
        <form class="space-y-5 text-right">
          <div>
            <label class="block text-sm font-bold text-[#1A1A1A] mb-2">الاسم الكامل</label>
            <input type="text" class="form-input" placeholder="أدخل اسمك الكامل">
          </div>
          <div>
            <label class="block text-sm font-bold text-[#1A1A1A] mb-2">البريد الإلكتروني</label>
            <input type="email" class="form-input" placeholder="أدخل بريدك الإلكتروني">
          </div>
          <div>
            <label class="block text-sm font-bold text-[#1A1A1A] mb-2">رقم الجوال</label>
            <input type="tel" class="form-input" placeholder="05xxxxxxxx" dir="ltr">
          </div>
          <div>
            <label class="block text-sm font-bold text-[#1A1A1A] mb-2">رسالتك</label>
            <textarea rows="4" class="form-input resize-none" placeholder="كيف يمكننا مساعدتك؟"></textarea>
          </div>
          <button type="submit" class="btn-gold w-full justify-center text-lg">
            إرسال الرسالة
            <lucide-icon name="send" class="w-5 h-5"></lucide-icon>
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
