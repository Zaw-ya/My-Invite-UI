<section id="designs" class="section-py" style="background-color: var(--bg);">
  <div class="container mx-auto px-5">

    <!-- Header -->
    <div class="text-center space-y-4 mb-8">
      <h2 class="section-title">تصميمات <span>كروتنا</span></h2>
      <p class="section-sub">استمتع بجمال الأقسام المختارة خصيصاً لتناسب جميع مناسباتك</p>
    </div>

    <!-- Category Filter (above carousel) -->
    <div class="designs-filter-wrap mb-6">
      <div class="designs-filter">
        @for (cat of categories; track cat) {
          <button
            class="tag-pill"
            [class.active]="activeFilter() === cat"
            (click)="setFilter(cat)"
          >{{ cat }}</button>
        }
      </div>
    </div>

    <!-- Carousel -->
    <div class="carousel-root">

      <!-- Prev Arrow -->
      <button class="carousel-arrow carousel-arrow-prev" (click)="prev()" [disabled]="currentIndex() === 0">
        <lucide-icon name="arrow-right" class="w-5 h-5"></lucide-icon>
      </button>

      <!-- Track viewport -->
      <div class="carousel-viewport" (mousedown)="onDragStart($event)" (touchstart)="onDragStart($event)">
        <div
          class="carousel-track"
          [style.transform]="'translateX(' + translateX() + '%)'"
        >
          @for (card of filtered(); track card.id) {
            <div class="carousel-slide">
              <div class="design-card group">
                <div class="design-card-image">
                  <span class="design-badge-new">جديد</span>
                  <img [src]="card.imageUrl" [alt]="card.title"
                       class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500">
                  <div class="design-overlay">
                    <button class="design-overlay-btn" (click)="openPreview(card)">
                      <lucide-icon name="eye" class="w-4 h-4"></lucide-icon>
                      معاينة
                    </button>
                  </div>
                </div>
                <div class="design-card-info">
                  <p class="text-xs mb-1" style="color: var(--text-muted);">{{ card.category }}</p>
                  <h4 class="font-bold text-sm" style="color: var(--text);">{{ card.title }}</h4>
                </div>
              </div>
            </div>
          }
        </div>
      </div>

      <!-- Next Arrow -->
      <button class="carousel-arrow carousel-arrow-next" (click)="next()" [disabled]="currentIndex() === maxIndex()">
        <lucide-icon name="arrow-left" class="w-5 h-5"></lucide-icon>
      </button>

    </div>

    <!-- Gender Filter (below carousel, small gap) -->
    <div class="designs-filter-wrap mt-6 mb-4">
      <div class="designs-filter">
        <button class="tag-pill" [class.active]="activeGender() === 'كل التصميمات'" (click)="setGender('كل التصميمات')">كل التصميمات</button>
        <button class="tag-pill" [class.active]="activeGender() === 'تصميمات ذكورية'" (click)="setGender('تصميمات ذكورية')">تصميمات ذكورية</button>
        <button class="tag-pill" [class.active]="activeGender() === 'تصميمات أنثوية'" (click)="setGender('تصميمات أنثوية')">تصميمات أنثوية</button>
      </div>
    </div>

    <!-- Dot Indicators -->
    <div class="carousel-dots">
      @for (d of dots(); track d) {
        <button
          class="carousel-dot"
          [class.active]="currentIndex() === d"
          (click)="goTo(d)"
        ></button>
      }
    </div>

     <!-- Browse All CTA -->
     <div class="mt-14 text-center">
       <button class="btn-outline-gold px-16 py-4 text-base" (click)="navigateToDesigns()">
         تصفح جميع التصميمات
         <lucide-icon name="arrow-left" class="w-4 h-4"></lucide-icon>
       </button>
     </div>

  </div>
</section>

<!-- ===== IMAGE PREVIEW LIGHTBOX ===== -->
@if (previewCard()) {
  <div class="lightbox-backdrop" (click)="closePreview()">
    <div class="lightbox-box" (click)="$event.stopPropagation()">
      <button class="lightbox-close" (click)="closePreview()">
        <lucide-icon name="x" class="w-5 h-5"></lucide-icon>
      </button>
      <img [src]="previewCard()!.imageUrl" [alt]="previewCard()!.title" class="lightbox-img">
      <p class="lightbox-title">{{ previewCard()!.title }}</p>
    </div>
  </div>
}
