<section id="designs" class="section-py" style="background-color: var(--bg);">
  <div class="container mx-auto px-5">

    <!-- Header -->
    <div class="text-center space-y-4 mb-12">
      <span class="badge-pill">✦ تصاميمنا</span>
      <h2 class="section-title">تصميمات <span>كروتنا</span></h2>
      <p class="section-sub">استمتع بجمال الأقسام المختارة خصيصاً لتناسب جميع مناسباتك</p>
    </div>

    <!-- Category Filter Tabs (matching PDF style) -->
    <div class="designs-filter-wrap mb-10">
      <div class="designs-filter">
        <button class="tag-pill active">كل التصميمات</button>
        <button class="tag-pill">حفل زفاف</button>
        <button class="tag-pill">خطبة / حناء</button>
        <button class="tag-pill">حفل تخرج</button>
        <button class="tag-pill">مناقشة رسالة</button>
        <button class="tag-pill">حدث تقني / خاص</button>
        <button class="tag-pill">عيد ميلاد</button>
        <button class="tag-pill">سبوع</button>
        <button class="tag-pill">تهنئة</button>
      </div>
    </div>

    <!-- Gender Filter Row -->
    <div class="flex justify-center gap-3 mb-10">
      <button class="tag-pill active-dark">كل التصميمات</button>
      <button class="tag-pill">
        <lucide-icon name="male" class="w-3.5 h-3.5 me-1"></lucide-icon>
        تصميمات ذكورية
      </button>
      <button class="tag-pill">
        <lucide-icon name="female" class="w-3.5 h-3.5 me-1"></lucide-icon>
        تصميمات أنثوية
      </button>
    </div>

    <!-- Cards Grid -->
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6">
      @for (card of invitations; track card.id) {
        <div class="design-card group">
          <div class="design-card-image">
            <!-- New Badge -->
            <span class="design-badge-new">جديد</span>

            <img
              [src]="card.imageUrl"
              [alt]="card.title"
              class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500"
            >

            <!-- Hover overlay with quick action -->
            <div class="design-overlay">
              <button class="design-overlay-btn">
                <lucide-icon name="eye" class="w-4 h-4"></lucide-icon>
                معاينة
              </button>
            </div>
          </div>

          <div class="design-card-info">
            <p class="text-xs mb-1" style="color: var(--text-muted);">{{card.category}}</p>
            <h4 class="font-bold text-sm" style="color: var(--text);">{{card.title}}</h4>
          </div>
        </div>
      }
    </div>

    <!-- Browse All CTA -->
    <div class="mt-14 text-center">
      <button class="btn-outline-gold px-16 py-4 text-base">
        تصفح جميع التصميمات
        <lucide-icon name="arrow-left" class="w-4 h-4"></lucide-icon>
      </button>
    </div>

  </div>
</section>
