<section id="designs" class="py-24 bg-white">
  <div class="container mx-auto px-6">
    <div class="text-center space-y-4 mb-16">
      <h2 class="text-4xl font-extrabold text-text-main">منتجات وصلت حديثاً</h2>
      <p class="text-text-secondary">استمتع بجمال الاقسام المختارة خصيصاً لك لتلبي جميع احتياجاتك</p>
    </div>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
      <div *ngFor="let card of invitations" class="group cursor-pointer text-center">
        <div class="relative bg-secondary/30 rounded-2xl overflow-hidden mb-4 aspect-[3/4] flex items-center justify-center p-4">
          <!-- New Badge -->
          <div class="absolute top-4 left-4 bg-[#B22222] text-white text-[10px] font-bold px-2 py-1 rounded shadow-sm z-20">
            جديد
          </div>
          
          <!-- Product Image -->
          <img 
            [src]="card.imageUrl" 
            [alt]="card.title" 
            class="max-w-full max-h-full object-contain shadow-2xl group-hover:scale-105 transition-transform duration-500"
          >
          
          <!-- Hover Overlay -->
          <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-all"></div>
        </div>
        
        <div class="space-y-1">
          <p class="text-sm text-text-secondary">{{card.category}}</p>
          <h4 class="text-lg font-bold text-text-main">{{card.title}}</h4>
        </div>
      </div>
    </div>
    
    <div class="mt-16 text-center">
      <button class="px-12 py-3 border border-text-main text-text-main rounded-lg font-bold hover:bg-text-main hover:text-white transition-all">
        تصفح جميع المنتجات
      </button>
    </div>
  </div>
</section>
