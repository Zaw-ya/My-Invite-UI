<section id="testimonials" class="section-py" style="background-color: var(--bg-secondary);">
  <div class="container mx-auto px-5">

    <!-- Header -->
    <div class="text-center mb-14 space-y-3">
      <span class="badge-pill">✦ آراء عملائنا</span>
      <h2 class="section-title">ماذا يقول <span>عملاؤنا</span></h2>
      <div class="gold-divider mx-auto" style="width: 56px;"></div>
      <p class="section-sub">آلاف المناسبات الناجحة وعملاء سعداء في المملكة</p>
    </div>

    <!-- Cards -->
    <div class="grid md:grid-cols-2 gap-8">
      @for (t of testimonials; track t.id) {
        <div class="testimonial-card">

          <!-- Decorative quote -->
          <div class="testimonial-quote" aria-hidden="true">"</div>

          <!-- Stars -->
          <div class="testimonial-stars">
            @for (i of [1,2,3,4,5]; track i) {
              <lucide-icon name="star" class="w-5 h-5 fill-current"></lucide-icon>
            }
          </div>

          <!-- Review text -->
          <p class="testimonial-text">"{{ t.content }}"</p>

          <hr class="testimonial-divider">

          <!-- Author -->
          <div class="testimonial-footer">
            <div class="text-right">
              <p class="testimonial-name">{{ t.name }}</p>
              <p class="testimonial-role">{{ t.role }} &bull; {{ t.eventType }}</p>
            </div>
            <div class="testimonial-avatar">{{ t.name.charAt(0) }}</div>
          </div>

        </div>
      }
    </div>

  </div>
</section>
